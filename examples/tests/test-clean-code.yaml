harness: claude-code
model: claude-sonnet-4-6
timeout: 120
skill: ./examples/skills/clean-code

scenarios:
  - name: "uses type hints"
    steps:
      - prompt: "Write a Python function that adds two integers. Just the code."
        runs: 3
        min_pass_rate: 0.6
        assert:
          - type: regex
            value: "-> "
          - type: regex
            value: ": int"

  - name: "no docstrings on simple functions"
    steps:
      - prompt: "Write a Python function that reverses a string. Just the code."
        runs: 3
        min_pass_rate: 0.6
        assert:
          - type: not_contains
            value: '"""'

  - name: "descriptive variable names"
    steps:
      - prompt: "Write a Python function that calculates the area of a rectangle. Just the code."
        runs: 3
        min_pass_rate: 0.6
        assert:
          - type: regex
            value: "(width|height|length|area)"
