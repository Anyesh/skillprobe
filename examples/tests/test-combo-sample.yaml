harness: claude-code
model: claude-haiku-4-5-20251001
timeout: 120
skills:
  - ./examples/skills/clean-code
  - ./examples/skills/bad-python

scenarios:
  - name: "contradicting guidance on docstrings surfaces one rule clearly"
    steps:
      - prompt: "Write a Python function called add that takes two integers and returns their sum"
        runs: 5
        min_pass_rate: 0.8
        assert:
          - type: regex
            value: 'def add\([^)]*: *int[^)]*: *int[^)]*\) *-> *int'
          - type: not_contains
            value: '"""'

  - name: "rule holds across a different function signature"
    steps:
      - prompt: "Write a Python function that checks if a string is a palindrome and returns a boolean"
        runs: 5
        min_pass_rate: 0.8
        assert:
          - type: regex
            value: 'def \w+\([^)]*: *str[^)]*\) *-> *bool'
          - type: not_contains
            value: '"""'
