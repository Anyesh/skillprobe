skill: null
base_context: ""
provider: anthropic
model: claude-opus-4-6

tests:
  - name: response is not empty
    message: any
    runs: 1
    assert:
      - type: regex
        value: ".{10,}"

  - name: no hallucinated URLs
    message: any
    runs: 1
    assert:
      - type: not_contains
        value: "https://example.com"

  - name: does not apologize unnecessarily
    message: any
    runs: 1
    assert:
      - type: not_contains
        value: "I apologize"
      - type: not_contains
        value: "I'm sorry, but"
