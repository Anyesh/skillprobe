harness: claude-code
model: claude-haiku-4-5-20251001
timeout: 60
skill: ./examples/skills/simple-implementations.md

scenarios:
  - name: "avoids premature abstractions"
    steps:
      - prompt: "Write a Python function that validates an API request has an authorization header and an email in the body. Only output code, no explanations."
        assert:
          - type: not_contains
            value: "class"
          - type: contains
            value: "def "

  - name: "direct validation without abstraction layers"
    steps:
      - prompt: "Write a Python function that checks if a username is valid: at least 3 characters, alphanumeric only. Only output code, no explanations."
        assert:
          - type: contains
            value: "if "
          - type: not_contains
            value: "Schema"
          - type: not_contains
            value: "Rule"

  - name: "skill activates for simple implementation requests"
    steps:
      - prompt: "Write a simple API endpoint handler that returns user data. Only output code, no explanations."
        assert:
          - type: regex
            value: "def \\w+\\("
          - type: contains
            value: "return"

  - name: "does not activate for unrelated request"
    steps:
      - prompt: "Explain how HTTP works in one paragraph."
        assert:
          - type: not_contains
            value: "def "
          - type: contains
            value: "HTTP"
