harness: claude-code
model: claude-haiku-4-5-20251001
timeout: 60
skill: ./examples/skills/systematic-debugging.md

scenarios:
  - name: "reads error message first"
    steps:
      - prompt: "This test is failing with 'AssertionError: expected 3 but got 5'. What should I do first?"
        assert:
          - type: contains
            value: "error"

  - name: "suggests tracing execution"
    steps:
      - prompt: "My function returns the wrong value but I have no idea where the bug is. How should I approach this?"
        assert:
          - type: regex
            value: "(?i)(trace|step through|debugger|breakpoint|log)"

  - name: "activates for debugging requests"
    steps:
      - prompt: "Help me debug this: my test is failing and I don't know why."
        assert:
          - type: regex
            value: "(?i)(error|fail|debug|trace|root cause)"

  - name: "does not activate for unrelated requests"
    steps:
      - prompt: "Write a web server in Python."
        assert:
          - type: not_contains
            value: "root cause"
          - type: not_contains
            value: "breakpoint"

  - name: "does not activate for code review"
    steps:
      - prompt: "Review this code for style issues."
        assert:
          - type: not_contains
            value: "trace execution"
